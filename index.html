<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SISTAN Quiz Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@300;600;900&display=swap');
        :root { --primary-blue: #0ea5e9; --soft-blue: #e0f2fe; --bg-light: #f0f9ff; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: var(--bg-light); color: #334155; margin: 0; overflow: hidden; height: 100dvh; }
        #app { height: 100dvh; width: 100%; display: flex; flex-direction: column; position: relative; }
        .bg-circle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(14, 165, 233, 0.1) 0%, rgba(14, 165, 233, 0) 70%); z-index: -1; }
        #splash { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s ease-out; pointer-events: none; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 1); border-radius: 2.5rem; box-shadow: 0 20px 50px rgba(14, 165, 233, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #0ea5e9, #38bdf8); color: white; font-weight: bold; }
        .choice-btn { background: white; border: 2px solid var(--soft-blue); text-align: left; padding: 1.25rem; border-radius: 1.5rem; font-weight: bold; color: #0369a1; width: 100%; transition: all 0.2s; }
        .ans-correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .ans-wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }
        
        .rank-S { color: #f59e0b; } .rank-A { color: #ef4444; } .rank-B { color: #3b82f6; } .rank-C { color: #10b981; } .rank-D { color: #64748b; }
        .rank-badge { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; }

        .produced-by { font-family: 'Outfit', sans-serif; font-size: 0.75rem; letter-spacing: 0.4em; color: #94a3b8; text-transform: uppercase; text-align: center; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .progress-ring__circle { transition: stroke-dashoffset 0.8s ease-in-out; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        @keyframes floatGlow {
            0% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.2; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100px) translateX(50px) scale(1.5); opacity: 0; }
        }
        .glow-particle { position: absolute; background: radial-gradient(circle, rgba(56,189,248,0.8) 0%, rgba(14,165,233,0) 70%); border-radius: 50%; animation: floatGlow 4s infinite linear; }
    </style>
</head>
<body>
    <div id="splash"><p class="produced-by animate-pulse">Produced by Henly</p></div>
    <div class="bg-circle w-[500px] h-[500px] -top-20 -left-20"></div>
    <div class="bg-circle w-[400px] h-[400px] bottom-0 -right-20"></div>
    <div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCLn0SOd7xvuQ5Zd9IKsR71ugCw96m6Gsw",
  authDomain: "sistan-test-9fe0b.firebaseapp.com",
  projectId: "sistan-test-9fe0b",
  storageBucket: "sistan-test-9fe0b.firebasestorage.app",
  messagingSenderId: "1047056215317",
  appId: "1:1047056215317:web:3ec726d8808a8ae0040d1c"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

window.wordData = [
あ
    あ
    あ
    
];

let state = { 
    view: 'login', 
    currentUser: null, 
    users: [], 
    quiz: null, 
    quizType: null, 
    rangeKey: "", 
    messages: [], 
    hasUnread: false, 
    expandedMsgId: null,
    celebrateCount: 0, 
    postCelebrateCallback: null,
    triggerCelebrationAtEnd: false,
    targetCelebrationCount: 0,
    selectedAdminUserId: null 
};
const root = document.getElementById('app');

const getRankLabel = (score) => {
    if (score >= 20) return 'S';
    if (score >= 18) return 'A';
    if (score >= 15) return 'B';
    if (score >= 10) return 'C';
    return 'D';
};

const getRankClass = (label) => {
    switch(label) {
        case 'S': return 'rank-S';
        case 'A': return 'rank-A';
        case 'B': return 'rank-B';
        case 'C': return 'rank-C';
        default: return 'rank-D';
    }
};

const getRankOrder = (label) => {
    const orders = { 'S': 5, 'A': 4, 'B': 3, 'C': 2, 'D': 1, '-': 0 };
    return orders[label] || 0;
};

window.nav = (v, type = null) => { state.view = v; if (type) state.quizType = type; render(); };
window.adminLogin = () => { const p = prompt("ADMIN PASS"); if (p === "Henly0402") window.nav('admin'); };

window.viewAdminUserDetail = (userId) => {
    state.selectedAdminUserId = userId;
    window.nav('admin_user_detail');
};

window.syncUserMasterProgress = async (userId) => {
    const targetUser = state.users.find(u => u.id === userId);
    if (!targetUser) return alert("ユーザーデータが見つかりません");

    const realCount = targetUser.masterSolved ? targetUser.masterSolved.length : 0;
    targetUser.progress = realCount;

    try {
        await setDoc(doc(db, "users", userId), targetUser);
        alert(`Firestoreの進行状況(progress)を ${realCount} 語に同期しました！`);
        render();
    } catch (e) {
        alert("同期エラー: " + e.message);
    }
};

window.login = () => {
    const id = document.getElementById('uID').value;
    const pw = document.getElementById('uPW').value;
    const u = state.users.find(x => x.id === id && x.pass === pw);
    if (u) { 
        state.currentUser = u; 
        window.nav('home'); 
    } else { 
        alert("ID/PW Error"); 
    }
};

window.addNewUser = async () => {
    const newId = document.getElementById('newID').value.trim();
    const newPw = document.getElementById('newPW').value.trim();
    if (!newId || !newPw) return alert("IDとパスワードを入力してください");
    if (state.users.some(u => u.id === newId)) return alert("そのIDは既に存在します");

    const newUser = { id: newId, pass: newPw, progress: 0, bestRanks: {}, masterSolved: [] };
    try {
        await setDoc(doc(db, "users", newId), newUser);
        state.users.push(newUser);
        alert(`ユーザー ${newId} を作成しました`);
        render();
    } catch (e) { alert("エラー: " + e.message); }
};

window.sendAdminMessage = async () => {
    const msg = document.getElementById('adminMsgInput').value.trim();
    if (!msg) return alert("メッセージを入力してください");
    
    const msgId = "msg_" + Date.now();
    const newMsgObj = { id: msgId, text: msg, updatedAt: Date.now() };
    
    try {
        await setDoc(doc(db, "announcements", msgId), newMsgObj);
        state.messages.unshift(newMsgObj);
        alert("メッセージを配信しました！");
        document.getElementById('adminMsgInput').value = "";
        render();
    } catch (e) { alert("送信エラー: " + e.message); }
};

window.toggleMailBox = () => {
    const modal = document.getElementById('mailModal');
    if (modal) {
        modal.classList.toggle('hidden');
        modal.classList.toggle('flex');
        if (modal.classList.contains('flex')) {
            state.hasUnread = false;
            if (state.messages.length > 0 && state.currentUser) {
                localStorage.setItem(`lastReadMsgId_${state.currentUser.id}`, state.messages[0].id);
            }
            render();
            const updatedModal = document.getElementById('mailModal');
            if (updatedModal) { updatedModal.classList.remove('hidden'); updatedModal.classList.add('flex'); }
        }
    }
};

window.toggleExpandMessage = (id) => {
    state.expandedMsgId = state.expandedMsgId === id ? null : id;
    render();
    const modal = document.getElementById('mailModal');
    if (modal) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
};

window.previewCelebrate = (count) => {
    state.celebrateCount = count;
    state.postCelebrateCallback = () => { window.nav('admin'); };
    window.nav('celebrate');
};

window.closeCelebrateView = () => {
    if (state.postCelebrateCallback) {
        state.postCelebrateCallback();
    }
};

window.startQuiz = (min, max) => {
    state.rangeKey = `${state.quizType}_${min}_${max}`;
    state.triggerCelebrationAtEnd = false;
    state.targetCelebrationCount = 0;
    const pool = window.wordData.filter(w => w.id >= min && w.id <= max);
    const count = Math.min(pool.length, 20);
    const selected = [...pool].sort(() => Math.random() - 0.5).slice(0, count);
    state.quiz = {
        questions: selected.map(item => {
            let choices = [item.ja]; 
            while (choices.length < 4) {
                const r = window.wordData[Math.floor(Math.random() * window.wordData.length)].ja;
                if (!choices.includes(r)) choices.push(r);
            }
            return { id: item.id, en: item.en, ja: item.ja, opts: choices.sort(() => Math.random() - 0.5) };
        }),
        curr: 0, score: 0, wrongWords: [] // 今回のテスト内だけの間違い用。開始時に必ずクリア
    };
    window.nav('quiz');
};

window.startRangeWrongWordsQuiz = (e, quizType, min, max) => {
    e.stopPropagation();

    const targetArrayKey = `wrongWordIds_${quizType}_${min}_${max}`;
    if (!state.currentUser[targetArrayKey] || state.currentUser[targetArrayKey].length === 0) {
        return alert("この範囲の間違えた問題はありません！");
    }
    
    state.quizType = `Review_${quizType}_${min}_${max}`; 
    state.rangeKey = `Review_${quizType}_${min}_${max}_Mode`;
    state.triggerCelebrationAtEnd = false;

    const pool = window.wordData.filter(w => state.currentUser[targetArrayKey].includes(w.id));
    const count = Math.min(pool.length, 10);
    const selected = [...pool].sort(() => Math.random() - 0.5).slice(0, count);

    state.quiz = {
        questions: selected.map(item => {
            let choices = [item.ja]; 
            while (choices.length < 4) {
                const r = window.wordData[Math.floor(Math.random() * window.wordData.length)].ja;
                if (!choices.includes(r)) choices.push(r);
            }
            return { id: item.id, en: item.en, ja: item.ja, opts: choices.sort(() => Math.random() - 0.5) };
        }),
        curr: 0, score: 0, wrongWords: [] // 復習テスト内だけの間違い用。開始時に必ずクリア
    };
    window.nav('quiz');
};

window.checkAns = async (idx) => {
    const q = state.quiz.questions[state.quiz.curr];
    const ok = (q.opts[idx] === q.ja);

    // 今回の1回のテストのwrongWordsリストに、この単語がすでに格納されているか確認（重複ガード）
    const isAlreadyInCurrentTestResults = state.quiz.wrongWords.some(w => w.en === q.en);

    if (state.quizType.startsWith('Review_')) {
        const parts = state.quizType.split('_'); 
        const section = parts[1];
        const min = parts[2];
        const max = parts[3];
        const targetArrayKey = `wrongWordIds_${section}_${min}_${max}`;
        
        if (ok) {
            state.quiz.score++;
            // 克服に成功したら永続保存用（Firestore側）の苦手リストから除外
            if (state.currentUser[targetArrayKey]) {
                state.currentUser[targetArrayKey] = state.currentUser[targetArrayKey].filter(id => id !== q.id);
            }
        } else {
            // 今回のテストの結果画面用のみに追加
            if (!isAlreadyInCurrentTestResults) {
                state.quiz.wrongWords.push({ en: q.en, ja: q.ja });
            }
        }
        await setDoc(doc(db, "users", state.currentUser.id), state.currentUser);
    } 
    else if (state.quizType === 'Master' && state.currentUser) {
        let currentProgress = state.currentUser.progress || 0;
        if (!state.currentUser.masterSolved) state.currentUser.masterSolved = [];
        const isAlreadySolved = state.currentUser.masterSolved.includes(q.id);

        if (ok) { 
            state.quiz.score++; 
            if (!isAlreadySolved) {
                currentProgress = Math.min(2000, currentProgress + 1);
                state.currentUser.masterSolved.push(q.id);
                if (currentProgress > 0 && currentProgress % 100 === 0) {
                    state.triggerCelebrationAtEnd = true;
                    state.targetCelebrationCount = currentProgress;
                }
            }
        } 
        else { 
            // 今回のテストの結果画面用のみに追加
            if (!isAlreadyInCurrentTestResults) {
                state.quiz.wrongWords.push({ en: q.en, ja: q.ja }); 
            }
            if (isAlreadySolved) {
                currentProgress = Math.max(0, currentProgress - 1);
                state.currentUser.masterSolved = state.currentUser.masterSolved.filter(id => id !== q.id);
            }
        }
        state.currentUser.progress = currentProgress;
        await setDoc(doc(db, "users", state.currentUser.id), state.currentUser);
    } 
    else {
        // 通常のセクション別テスト（Basic / Standard）
        if (ok) {
            state.quiz.score++;
        } else {
            // 今回のテストの結果画面用のみに追加
            if (!isAlreadyInCurrentTestResults) {
                state.quiz.wrongWords.push({ en: q.en, ja: q.ja });
            }
            
            // データベースの各範囲ごとの苦手フォルダへの保存処理
            const targetArrayKey = `wrongWordIds_${state.rangeKey}`; 
            if (!state.currentUser[targetArrayKey]) {
                state.currentUser[targetArrayKey] = [];
            }
            if (!state.currentUser[targetArrayKey].includes(q.id)) {
                state.currentUser[targetArrayKey].push(q.id);
            }
        }
        await setDoc(doc(db, "users", state.currentUser.id), state.currentUser);
    }

    const btns = document.querySelectorAll('.choice-btn');
    btns.forEach((b, i) => {
        b.onclick = null;
        if (i === idx) b.classList.add(ok ? 'ans-correct' : 'ans-wrong');
        if (q.opts[i] === q.ja) b.classList.add('ans-correct');
    });

    setTimeout(() => {
        if (state.quiz.curr < state.quiz.questions.length - 1) { 
            state.quiz.curr++; 
            render(); 
        } else { 
            finalizeQuiz(); 
        }
    }, 800);
};

const finalizeQuiz = async () => {
    if (state.quizType !== 'Master' && !state.quizType.startsWith('Review_') && state.currentUser) {
        const currentLabel = getRankLabel(state.quiz.score);
        if (!state.currentUser.bestRanks) state.currentUser.bestRanks = {};
        const prevLabel = state.currentUser.bestRanks[state.rangeKey] || '-';
        if (getRankOrder(currentLabel) > getRankOrder(prevLabel)) {
            state.currentUser.bestRanks[state.rangeKey] = currentLabel;
            await setDoc(doc(db, "users", state.currentUser.id), state.currentUser);
        }
    }
    window.nav('result');
};

function render() {
    const footer = `<p class="produced-by py-6">Produced by Henly</p>`;

    if (state.view === 'login') {
        root.innerHTML = `<div class="flex-1 flex flex-col justify-between p-8 fade-in">
            <div class="flex-1 flex flex-col justify-center">
                <div class="glass-card p-10 text-center">
                    <button onclick="window.adminLogin()" class="mb-4 text-[10px] text-sky-200 font-bold uppercase tracking-widest">Admin Access</button>
                    <h1 class="text-5xl font-black text-sky-500 mb-6 italic" style="font-family:'Outfit'">LEAP</h1>
                    <div class="space-y-4">
                        <input id="uID" type="text" placeholder="ID" class="w-full p-4 bg-sky-50 rounded-2xl outline-none border border-sky-100">
                        <input id="uPW" type="password" placeholder="PASS" class="w-full p-4 bg-sky-50 rounded-2xl outline-none border border-sky-100">
                        <button onclick="window.login()" class="w-full py-4 btn-primary rounded-2xl font-black">LOGIN</button>
                    </div>
                </div>
            </div>
            ${footer}
        </div>`;
    } 
    else if (state.view === 'home') {
        root.innerHTML = `<div class="flex-1 flex flex-col justify-between p-8 fade-in relative">
            <div class="flex-1 flex flex-col pt-10">
                <div class="flex items-center justify-center gap-3 mb-10">
                    <h2 class="text-3xl font-black text-slate-700 tracking-tight">${state.currentUser.id}</h2>
                    <button onclick="window.toggleMailBox()" class="relative p-2 bg-white rounded-full shadow-sm border border-sky-100 text-xl hover:scale-105 transition-transform">
                        ✉️
                        ${state.hasUnread ? `<span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full ring-2 ring-white"></span>` : ''}
                    </button>
                </div>

                <div class="space-y-4">
                    <button onclick="window.nav('range', 'Basic')" class="w-full py-6 glass-card border-b-4 border-sky-400 font-bold text-slate-600">BASIC</button>
                    <button onclick="window.nav('range', 'Standard')" class="w-full py-6 glass-card border-b-4 border-blue-400 font-bold text-slate-600">STANDARD</button>
                    <button onclick="window.nav('range', 'Master')" class="w-full py-6 glass-card border-b-4 border-amber-400 font-bold text-amber-500">MASTER</button>
                </div>
                <button onclick="location.reload()" class="mt-10 text-slate-300 text-xs font-bold uppercase text-center">Logout</button>
            </div>
            ${footer}

            <div id="mailModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 items-center justify-center p-6 fade-in">
                <div class="glass-card w-full p-6 text-center max-w-sm flex flex-col max-h-[80dvh]">
                    <div class="text-xl font-black text-slate-700 mb-4">メッセージボックス ✉️</div>
                    <div class="flex-1 overflow-y-auto space-y-3 pr-1 scrollbar-hide text-left">
                        ${state.messages.length === 0 ? `
                            <div class="text-center text-sm text-slate-400 py-8">メッセージはありません。</div>
                        ` : state.messages.map(m => {
                            const isExpanded = state.expandedMsgId === m.id;
                            const dateStr = new Date(m.updatedAt).toLocaleDateString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                            return `
                            <div onclick="window.toggleExpandMessage('${m.id}')" class="bg-white hover:bg-sky-50/40 border border-sky-100 rounded-2xl p-4 cursor-pointer transition-colors shadow-sm">
                                <div class="text-[10px] text-sky-400 font-bold mb-1">${dateStr}</div>
                                <div class="text-sm text-slate-600 font-medium leading-relaxed whitespace-pre-wrap ${isExpanded ? '' : 'line-clamp-3'}">
                                    ${m.text}
                                </div>
                                ${!isExpanded && m.text.split('\n').length > 3 || (!isExpanded && m.text.length > 60) ? `
                                    <div class="text-[10px] text-slate-300 text-right mt-1 font-bold tracking-widest">TAP TO READ ALL ▶</div>
                                ` : ''}
                            </div>`;
                        }).join('')}
                    </div>
                    <button onclick="window.toggleMailBox()" class="mt-4 w-full py-3 btn-primary rounded-xl font-bold shrink-0">閉じる</button>
                </div>
            </div>
        </div>`;
    } 
    else if (state.view === 'range') {
        if(state.quizType === 'Master'){
            const prog = state.currentUser.progress || 0;
            const radius = 70;
            const circum = 2 * Math.PI * radius;
            const offset = circum - ((prog / 2000) * circum);
            root.innerHTML = `<div class="p-8 flex-1 flex flex-col items-center justify-center fade-in text-center">
                <h2 class="text-3xl font-black text-amber-500 mb-8 italic" style="font-family:'Outfit'">PROGRESS</h2>
                <div class="relative flex items-center justify-center mb-10">
                    <svg width="180" height="180"><circle class="text-slate-100" stroke="currentColor" stroke-width="12" fill="transparent" r="${radius}" cx="90" cy="90"/><circle class="progress-ring__circle text-amber-400" stroke="currentColor" stroke-width="12" stroke-linecap="round" fill="transparent" r="${radius}" cx="90" cy="90" style="stroke-dasharray: ${circum}; stroke-dashoffset: ${offset}"/></svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center"><span class="text-4xl font-black text-slate-700">${prog}</span><span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">/ 2000</span></div>
                </div>
                <button onclick="window.startQuiz(1, 2000)" class="w-full py-6 btn-primary rounded-3xl font-black text-xl">START TEST</button>
                <button onclick="window.nav('home')" class="mt-8 text-sky-400 font-bold text-xs">BACK</button>
            </div>`;
        } else {
            let btns = "";
            let step = (state.quizType === 'Basic') ? 100 : 400;
            for (let i = 1; i <= 2000; i += step) {
                const min = i;
                const max = i + step - 1;
                const key = `${state.quizType}_${min}_${max}`;
                const bestLabel = (state.currentUser.bestRanks && state.currentUser.bestRanks[key]) ? state.currentUser.bestRanks[key] : '-';
                
                const targetArrayKey = `wrongWordIds_${key}`;
                const rangeWrongCount = state.currentUser[targetArrayKey] ? state.currentUser[targetArrayKey].length : 0;

                btns += `
                <button onclick="window.startQuiz(${min}, ${max})" class="w-full p-5 glass-card mb-4 flex justify-between items-center border-l-4 border-sky-300 px-6 active:scale-[0.99] transition-transform">
                    <span class="font-bold text-slate-600">${min} — ${max}</span>
                    
                    <div class="flex items-center gap-4 ml-auto">
                        ${rangeWrongCount > 0 ? `
                            <div onclick="window.startRangeWrongWordsQuiz(event, '${state.quizType}', ${min}, ${max})" class="px-3 py-1 bg-gradient-to-r from-red-500 to-rose-400 text-white rounded-xl text-xs font-black shadow-md border-b-2 border-red-700 hover:scale-105 active:scale-95 transition-transform flex items-center gap-1">
                                <span>❌</span> <span>${rangeWrongCount}</span>
                            </div>
                        ` : ''}
                        <span class="rank-badge ${getRankClass(bestLabel)} min-w-[1.5rem] text-center">${bestLabel}</span>
                    </div>
                </button>`;
            }
            root.innerHTML = `
            <div class="p-8 flex-1 flex flex-col fade-in overflow-hidden">
                <h2 class="text-2xl font-black mb-4 text-slate-700 uppercase tracking-widest">${state.quizType}</h2>
                <div class="flex-1 overflow-y-auto scrollbar-hide">${btns}</div>
                <button onclick="window.nav('home')" class="py-4 text-sky-400 font-bold text-center shrink-0">BACK</button>
            </div>`;
        }
    } 
    else if (state.view === 'quiz') {
        const q = state.quiz.questions[state.quiz.curr];
        root.innerHTML = `<div class="flex-1 flex flex-col p-6 fade-in">
            <div class="w-full h-2 bg-sky-100 rounded-full mt-4 overflow-hidden"><div class="h-full bg-sky-400 transition-all duration-300" style="width:${((state.quiz.curr+1)/state.quiz.questions.length)*100}%"></div></div>
            <div class="flex-1 flex flex-col justify-center items-center text-center px-4"><h2 class="text-5xl font-black text-slate-700" style="font-family:'Outfit'">${q.en}</h2></div>
            <div class="grid gap-3 mb-10">${q.opts.map((o, i) => `<button onclick="window.checkAns(${i})" class="choice-btn">${o}</button>`).join('')}</div>
        </div>`;
    } 
    else if (state.view === 'celebrate') {
        let particles = "";
        for(let i=0; i<30; i++) {
            const size = Math.random() * 40 + 10;
            const left = Math.random() * 100;
            const top = Math.random() * 100;
            const delay = Math.random() * 3;
            particles += `<div class="glow-particle" style="width:${size}px; height:${size}px; left:${left}%; top:${top}%; animation-delay:${delay}s;"></div>`;
        }

        root.innerHTML = `
        <div class="flex-1 bg-slate-950 flex flex-col items-center justify-center relative overflow-hidden select-none">
            ${particles}
            <div class="z-10 text-center px-6 animate-pulse pointer-events-none">
                <div class="text-sky-400 text-6xl md:text-7xl font-black tracking-widest mb-4" style="font-family:'Outfit'">${state.celebrateCount} WORDS</div>
                <div class="text-white text-3xl md:text-4xl font-extrabold tracking-wide mb-2">達成！</div>
                <div class="text-sky-300 text-xl font-bold tracking-widest" style="font-family:'Outfit'">Congratulations!!</div>
                <div class="text-slate-500 text-xs mt-16 tracking-widest uppercase">画面をタップして進む</div>
            </div>
            <div onclick="window.closeCelebrateView()" class="absolute inset-0 z-50 cursor-pointer"></div>
        </div>`;
    }
    else if (state.view === 'result') {
        if (state.triggerCelebrationAtEnd) {
            state.triggerCelebrationAtEnd = false; 
            state.celebrateCount = state.targetCelebrationCount;
            state.postCelebrateCallback = () => { window.nav('result'); }; 
            setTimeout(() => { window.nav('celebrate'); }, 100);
            return;
        }

        const isReview = state.quizType.startsWith('Review_');
        const label = isReview ? '-' : getRankLabel(state.quiz.score);
        let reviewHtml = "";
        if (state.quiz.wrongWords.length > 0) {
            reviewHtml = `<div class="mt-6 text-left w-full">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 px-1">Review (今回間違えた単語)</h3>
                <div class="max-h-40 overflow-y-auto space-y-2 pr-1 scrollbar-hide">
                    ${state.quiz.wrongWords.map(w => `<div class="flex justify-between items-center bg-red-50/50 border border-red-100/50 p-3 rounded-xl text-sm">
                        <span class="font-bold text-slate-700" style="font-family:'Outfit'">${w.en}</span>
                        <span class="text-xs text-red-600 font-medium">${w.ja}</span>
                    </div>`).join('')}
                </div>
            </div>`;
        } else {
            reviewHtml = `<div class="mt-6 p-4 bg-green-50/50 border border-green-100 rounded-xl text-sm text-green-600 font-bold tracking-wider animate-bounce">Perfect! 🎉 全問正解です！</div>`;
        }

        root.innerHTML = `<div class="flex-1 flex flex-col items-center justify-center p-6 fade-in text-center overflow-hidden">
            <div class="glass-card w-full py-8 px-6 max-h-[85dvh] flex flex-col justify-between overflow-hidden">
                <div class="overflow-y-auto scrollbar-hide flex-1 flex flex-col items-center">
                    <div class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em] mb-2">Quiz Result</div>
                    ${isReview ? `
                        <div class="text-3xl font-black text-sky-500 my-6" style="font-family:'Outfit'">復習テスト完了</div>
                    ` : `
                        <div class="text-[8rem] font-black ${getRankClass(label)} leading-none mb-2" style="font-family:'Outfit'">${label}</div>
                    `}
                    <div class="text-xl font-bold text-slate-500 mb-4">${state.quiz.score} / ${state.quiz.questions.length}</div>
                    ${reviewHtml}
                </div>
                <button onclick="window.nav('home')" class="w-full py-4 btn-primary rounded-2xl font-black tracking-widest uppercase mt-6 shrink-0">Continue</button>
            </div>
            ${footer}
        </div>`;
    }
    else if (state.view === 'admin') {
        root.innerHTML = `<div class="p-8 flex-1 flex flex-col fade-in overflow-y-auto bg-white">
            <h2 class="text-3xl font-black mb-6 text-sky-600 italic" style="font-family:'Outfit'">Admin Panel</h2>
            
            <div class="glass-card p-6 mb-6 border-2 border-amber-100 bg-amber-50/10 shadow-none">
                <h3 class="text-sm font-bold text-amber-500 uppercase tracking-widest mb-3">Broadcast Message</h3>
                <div class="space-y-3">
                    <textarea id="adminMsgInput" placeholder="全ユーザーへ送る連絡メッセージを入力..." class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-amber-300 text-sm h-24 resize-none"></textarea>
                    <button onclick="window.sendAdminMessage()" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-400 text-white font-bold rounded-2xl shadow-lg shadow-amber-100 text-sm">BROADCAST NEW MESSAGE</button>
                </div>
            </div>

            <div class="glass-card p-6 mb-8 border-2 border-sky-100 shadow-none">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Add New User</h3>
                <div class="space-y-3">
                    <input id="newID" type="text" placeholder="New ID" class="w-full p-4 bg-sky-50 rounded-2xl outline-none focus:ring-2 ring-sky-300">
                    <input id="newPW" type="text" placeholder="New Password" class="w-full p-4 bg-sky-50 rounded-2xl outline-none focus:ring-2 ring-sky-300">
                    <button onclick="window.addNewUser()" class="w-full py-4 btn-primary rounded-2xl font-bold shadow-lg shadow-sky-100">CREATE USER</button>
                </div>
            </div>

            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 px-2">User Progress List</h3>
            <p class="text-[11px] text-slate-400 -mt-2 mb-3 px-2">ユーザー名をタップすると詳細データが確認できます。</p>
            <div class="space-y-3 mb-8">
                ${state.users.sort((a,b) => {
                    const countA = a.masterSolved ? a.masterSolved.length : 0;
                    const countB = b.masterSolved ? b.masterSolved.length : 0;
                    return countB - countA;
                }).map(u => {
                    const solvedCount = u.masterSolved ? u.masterSolved.length : 0;
                    return `
                    <div onclick="window.viewAdminUserDetail('${u.id}')" class="p-5 glass-card flex justify-between items-center shadow-none border border-slate-100 cursor-pointer hover:bg-sky-50/30 transition-colors">
                        <div>
                            <div class="font-black text-slate-700 text-lg hover:text-sky-500">${u.id} ➔</div>
                            <div class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Pass: ${u.pass}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-sky-500 font-black text-2xl">${solvedCount}</div>
                            <div class="text-[9px] text-slate-300 font-bold uppercase">Words</div>
                        </div>
                    </div>`;
                }).join('')}
            </div>

            <button onclick="window.nav('login')" class="py-10 text-slate-300 font-bold text-center w-full uppercase text-xs tracking-[0.3em]">Exit Admin Mode</button>
        </div>`;
    }
    else if (state.view === 'admin_user_detail') {
        const targetUser = state.users.find(u => u.id === state.selectedAdminUserId);
        if (!targetUser) {
            root.innerHTML = `<div class="p-8 text-center text-slate-400">ユーザーが見つかりません。<button onclick="window.nav('admin')" class="mt-4 text-sky-500 font-bold block mx-auto">戻る</button></div>`;
            return;
        }

        const dynamicSolvedCount = targetUser.masterSolved ? targetUser.masterSolved.length : 0;

        let basicRanksHtml = "";
        for (let i = 1; i <= 2000; i += 100) {
            const key = `Basic_${i}_${i+99}`;
            const r = (targetUser.bestRanks && targetUser.bestRanks[key]) ? targetUser.bestRanks[key] : '-';
            basicRanksHtml += `
            <div class="flex justify-between items-center py-2 border-b border-slate-100 text-sm">
                <span class="text-slate-500 font-medium">${i} — ${i+99}</span>
                <span class="font-black rank-badge ${getRankClass(r)}">${r}</span>
            </div>`;
        }

        let standardRanksHtml = "";
        for (let i = 1; i <= 2000; i += 400) {
            const key = `Standard_${i}_${i+399}`;
            const r = (targetUser.bestRanks && targetUser.bestRanks[key]) ? targetUser.bestRanks[key] : '-';
            standardRanksHtml += `
            <div class="flex justify-between items-center py-2 border-b border-slate-100 text-sm">
                <span class="text-slate-500 font-medium">${i} — ${i+399}</span>
                <span class="font-black rank-badge ${getRankClass(r)}">${r}</span>
            </div>`;
        }

        root.innerHTML = `<div class="p-8 flex-1 flex flex-col fade-in overflow-y-auto bg-slate-50">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <span class="text-xs text-sky-500 font-bold uppercase tracking-widest block">User Study Data</span>
                    <h2 class="text-3xl font-black text-slate-700 tracking-tight">${targetUser.id}</h2>
                </div>
                <button onclick="window.nav('admin')" class="px-4 py-2 bg-white text-slate-600 border border-slate-200 font-bold rounded-xl text-xs shadow-sm hover:bg-slate-100">BACK</button>
            </div>

            <div class="glass-card p-6 mb-6 bg-gradient-to-br from-emerald-500 to-teal-600 text-white border-0 shadow-xl shadow-emerald-100">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <div class="text-xs font-bold text-emerald-100 uppercase tracking-widest mb-1">Saved Master Solved Count</div>
                        <div class="flex items-baseline gap-2">
                            <span class="text-5xl font-black">${dynamicSolvedCount}</span>
                            <span class="text-sm font-bold text-emerald-100">/ 2000 WORDS</span>
                        </div>
                    </div>
                    <button onclick="window.syncUserMasterProgress('${targetUser.id}')" class="px-4 py-2 bg-white/20 hover:bg-white/30 text-white font-bold rounded-xl text-xs uppercase tracking-wider backdrop-blur-sm transition-all border border-white/20 active:scale-95 shadow-inner">
                        🔄 Sync Data
                    </button>
                </div>
            </div>

            <div class="grid gap-6 md:grid-cols-2 mb-8">
                <div class="glass-card p-6 bg-white border border-slate-100 shadow-sm flex flex-col h-[400px]">
                    <h3 class="text-sm font-black text-slate-700 uppercase tracking-widest border-b border-slate-200 pb-2 mb-3">BASIC SECTION RANKS</h3>
                    <div class="flex-1 overflow-y-auto pr-1 scrollbar-hide">
                        ${basicRanksHtml}
                    </div>
                </div>

                <div class="glass-card p-6 bg-white border border-slate-100 shadow-sm flex flex-col h-[400px]">
                    <h3 class="text-sm font-black text-slate-700 uppercase tracking-widest border-b border-slate-200 pb-2 mb-3">STANDARD SECTION RANKS</h3>
                    <div class="flex-1 overflow-y-auto pr-1 scrollbar-hide">
                        ${standardRanksHtml}
                    </div>
                </div>
            </div>

            <button onclick="window.nav('admin')" class="w-full py-4 bg-slate-800 text-white font-black rounded-2xl text-center shadow-lg transition-transform text-sm tracking-widest uppercase">BACK TO ADMIN</button>
        </div>`;
    }
}

const startApp = () => {
    const splash = document.getElementById('splash');
    if(splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 800); }
    render();
};

(async () => {
    const startTime = Date.now();
    try {
        const snap = await getDocs(collection(db, "users"));
        state.users = snap.docs.map(d => d.data());

        const announcementsSnap = await getDocs(collection(db, "announcements"));
        let msgs = [];
        announcementsSnap.forEach(d => { msgs.push(d.data()); });
        state.messages = msgs.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)).slice(0, 20);
    } catch (e) { console.error(e); }
    const remaining = Math.max(0, 3000 - (Date.now() - startTime));
    setTimeout(startApp, remaining);
})();
</script>
</body>
</html>
